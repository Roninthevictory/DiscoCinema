<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinemaSync | Under Dev</title>
    <script src="discord-sdk.js"></script>
    
    <style>
        :root {
            --blurple: #5865F2;
            --bg-dark: #1E1F22;
            --card-bg: #2B2D31;
            --text-main: #FFFFFF;
            --text-muted: #B5BAC1;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 { font-size: 2.2rem; margin: 0 0 10px 0; }
        p { color: var(--text-muted); margin-bottom: 25px; font-size: 0.9rem; }

        .btn {
            background-color: var(--blurple);
            color: white;
            text-decoration: none;
            padding: 16px;
            display: block;
            border-radius: 8px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover { background-color: #4752C4; }

        .copy-box {
            margin-top: 20px;
            background: #1e1f22;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CinemaSync</h1>
        <p>This activity is currently under development by RVO INC.</p>

        <button id="join-btn" class="btn">Join Discord Server</button>

        <div class="copy-box" id="copy-btn">
            <code>discord.gg/SJcdkaJXcf</code>
            <div id="status" style="color: var(--blurple); font-size: 0.6rem; margin-top: 5px; font-weight: bold;">CLICK TO COPY</div>
        </div>
    </div>

    <script>
        const CLIENT_ID = "1481396281644679259";
        const INVITE = "https://discord.gg/SJcdkaJXcf";

        async function init() {
            const btn = document.getElementById('join-btn');

            // Wait a moment for the Proxy to pull the real SDK
            setTimeout(async () => {
                const DiscordSDK = window.discordSdk ? window.discordSdk.DiscordSDK : (window.discord ? window.discord.DiscordSDK : null);

                if (DiscordSDK) {
                    const discordSdk = new DiscordSDK(CLIENT_ID);
                    try {
                        await discordSdk.ready();
                        btn.onclick = () => discordSdk.commands.openExternalLink({ url: INVITE });
                        console.log("CinemaSync: SDK Mode Active");
                    } catch (e) {
                        btn.onclick = () => window.open(INVITE, '_blank');
                    }
                } else {
                    // Fallback if SDK is blocked by Discord CSP
                    btn.onclick = () => window.open(INVITE, '_blank');
                    console.log("CinemaSync: Browser Mode Active");
                }
            }, 1000);

            // Copy Logic
            document.getElementById('copy-btn').onclick = () => {
                navigator.clipboard.writeText(INVITE);
                document.getElementById('status').innerText = "COPIED!";
                setTimeout(() => { document.getElementById('status').innerText = "CLICK TO COPY"; }, 2000);
            };
        }

        init();
    </script>
</body>
</html>
